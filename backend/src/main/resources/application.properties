spring.application.name=figuritas

# Database
spring.datasource.url=jdbc:sqlite:figuritas.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# Archivos
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Log Spring Security internal events
logging.level.org.springframework.security=DEBUG

# Log HTTP filter chain
logging.level.org.springframework.security.web=DEBUG



# === PROPIEDADES PROPIAS DE LA APLICACIėN ===

# Access Tokens
app.auth.access-token.secret=01234567890123456789012345678901
app.auth.access-token.duration-minutes=99999

# CORS
app.cors-origins=http://localhost:5173,http://localhost:5174
